apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: model-access-policy
  namespace: agentgateway-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: agentgateway-proxy
  traffic:
    jwtAuthentication:
      providers:
      - issuer: "https://keycloak-ai-platforms-service-keycloak.apps-crc.testing/realms/chat-applications"
        jwks:
          remote:
            backendRef:
              name: keycloak-ai-platforms-service
              namespace: keycloak
              port: 8443
            jwksPath: "/realms/chat-applications/protocol/openid-connect/certs"
    authorization:
      action: Allow
      policy:
        matchExpressions:
        # METHOD 1: Match via Username and Model name
        # - 'jwt.preferred_username == "jay" && json(request.body).model in ["qwen3-06b", "qwen25-vl-instruct"]'
        # - 'jwt.preferred_username == "ben" && json(request.body).model == "qwen3-06b"'

        # METHOD 2: Match via Group name and Model name
        - '"full-access" in jwt.groups && json(request.body).model in ["qwen3-06b", "qwen25-vl-instruct"]'
        - '"partial-access" in jwt.groups && json(request.body).model == "qwen3-06b"'