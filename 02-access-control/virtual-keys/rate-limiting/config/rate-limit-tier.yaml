apiVersion: v1
kind: ConfigMap
metadata:
  name: rate-limit-config
  namespace: agentgateway-system
data:
  config.yaml: |
    domain: token-budgets
    descriptors:
      - key: tier
        value: "free"
        descriptors:
          - key: user_id
            rate_limit:
              unit: day
              requests_per_unit: 100   # 100 tokens/day for free tier
      - key: tier
        value: "standard"
        descriptors:
          - key: user_id
            rate_limit:
              unit: day
              requests_per_unit: 1000  # 1000 tokens/day for standard tier
      - key: tier
        value: "pro"
        descriptors:
          - key: user_id
            rate_limit:
              unit: day
              requests_per_unit: 10000  # 10K tokens/day for pro tier