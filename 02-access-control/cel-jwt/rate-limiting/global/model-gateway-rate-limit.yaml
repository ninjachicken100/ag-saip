apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: group-rate-limit
  namespace: agentgateway-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: agentgateway-proxy
  traffic:
    rateLimit:
      conditional:
        - condition: '"full-access" in jwt.groups'
          policy:
            local:
              - tokens: 20000
                unit: Minutes
        - condition: '"partial-access" in jwt.groups'
          policy:
            local:
              - tokens: 5000
                unit: Minutes